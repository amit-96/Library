version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: libra_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - libra_net

  ai-service:
    build: ./ai-service
    container_name: libra_ai_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - libra_net

  backend:
    build: ./backend
    container_name: libra_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/libra-ai
      - JWT_SECRET=supersecretlibraai_jsonwebtokenkey_123456
      - JWT_EXPIRE=30d
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - db
      - ai-service
    networks:
      - libra_net

  frontend:
    build: ./frontend
    container_name: libra_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - libra_net

volumes:
  mongo_data:

networks:
  libra_net:
    driver: bridge
